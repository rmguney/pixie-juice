<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Pixie Juice</title>
    <link rel="icon" type="image/png" href="pxjc.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 60px;
            color: #fff;
        }
        
        .main-area {
            border: 1px solid #333;
            border-radius: 4px;
            padding: 80px 40px;
            margin-bottom: 60px;
            transition: border-color 0.2s ease;
            cursor: pointer;
        }
        
        .main-area:hover,
        .main-area.highlight {
            border-color: #fff;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 1px solid #333;
            border-top: 1px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .drop-zone h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .drop-zone p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        button {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 24px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button:hover {
            background: #fff;
            color: #000;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .preview {
            margin-top: 40px;
        }
        
        canvas, video {
            max-width: 100%;
            border: 1px solid #333;
        }
        
        .error {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: #333;
            border: 1px solid #333;
        }
        
        .feature {
            background: #000;
            padding: 20px;
            font-size: 0.8rem;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .app {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5rem;
                margin-bottom: 40px;
            }
            
            .main-area {
                padding: 60px 20px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>Pixie Juice</h1>
        
        <div class="main-area">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading</p>
            </div>
            
            <div id="drop-zone" class="drop-zone" style="display: none;">
                <h2>Drop files here</h2>
                <p>Images, 3D models, videos</p>
                <input type="file" id="file-input" multiple accept="image/*,video/*,.obj,.gltf,.glb,.stl,.ply">
                <button onclick="document.getElementById('file-input').click()">Browse</button>
            </div>
            
            <div id="error" class="error" style="display: none;">
                <p>WebAssembly not supported.<br>Please use a modern browser.</p>
            </div>
        </div>
        
        <div id="preview" class="preview" style="display: none;">
            <canvas id="canvas"></canvas>
            <video id="video" controls></video>
        </div>
        
    </div>

    <script>
        async function init() {
            try {
                if (typeof WebAssembly !== 'object') {
                    showError();
                    return;
                }
                
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('drop-zone').style.display = 'block';
                
                setupDragDrop();
                
            } catch (error) {
                showError();
            }
        }
        
        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
        
        function setupDragDrop() {
            const area = document.querySelector('.main-area');
            const input = document.getElementById('file-input');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                area.addEventListener(e, prevent, false);
            });
            
            ['dragenter', 'dragover'].forEach(e => {
                area.addEventListener(e, () => area.classList.add('highlight'), false);
            });
            
            ['dragleave', 'drop'].forEach(e => {
                area.addEventListener(e, () => area.classList.remove('highlight'), false);
            });
            
            area.addEventListener('drop', handleDrop, false);
            input.addEventListener('change', e => handleFiles(e.target.files), false);
            
            function prevent(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            function handleDrop(e) {
                handleFiles(e.dataTransfer.files);
            }
            
            function handleFiles(files) {
                if (files.length === 0) return;
                
                const file = files[0];
                const preview = document.getElementById('preview');
                
                if (file.type.startsWith('image/')) {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        preview.style.display = 'block';
                        document.getElementById('video').style.display = 'none';
                        canvas.style.display = 'block';
                    };
                    
                    img.src = URL.createObjectURL(file);
                    
                } else if (file.type.startsWith('video/')) {
                    const video = document.getElementById('video');
                    video.src = URL.createObjectURL(file);
                    preview.style.display = 'block';
                    document.getElementById('canvas').style.display = 'none';
                    video.style.display = 'block';
                }
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
